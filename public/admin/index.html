<!DOCTYPE html>
<html lang="zh">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LUNE · Admin</title>
    <style>
      /* ═══════════════════════════════════════
         shadcn/ui design tokens
         ═══════════════════════════════════════ */
      :root {
        --bg:           #ffffff;
        --bg-subtle:    #fafafa;
        --fg:           #09090b;
        --fg-muted:     #71717a;
        --fg-subtle:    #a1a1aa;
        --border:       #e4e4e7;
        --border-hover: #d4d4d8;
        --card:         #ffffff;
        --muted:        #f4f4f5;
        --primary:      #18181b;
        --primary-fg:   #fafafa;
        --ring:         rgba(24,24,27,0.1);
        --radius:       8px;
        --radius-sm:    6px;
        --radius-xs:    4px;
        --shadow-sm:    0 1px 2px rgba(0,0,0,0.05);
        --shadow-md:    0 4px 12px rgba(0,0,0,0.08);
        --font:         system-ui, -apple-system, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
      }

      /* ═══════════════════════════════════════
         Loading screen
         ═══════════════════════════════════════ */
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      @keyframes fade-in {
        from { opacity: 0; transform: translateY(6px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      *, *::before, *::after { box-sizing: border-box; }

      html, body {
        margin: 0; padding: 0;
        background: var(--bg-subtle);
        color: var(--fg);
        font-family: var(--font);
      }

      #admin-loading {
        position: fixed; inset: 0;
        background: var(--bg-subtle);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 99999;
        transition: opacity 0.25s ease;
      }

      .lc {                       /* loading-card */
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 2.5rem 3rem;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1rem;
        width: 340px;
        box-shadow: var(--shadow-sm), 0 8px 32px rgba(0,0,0,0.05);
        animation: fade-in 0.3s ease both;
      }

      /* logo row */
      .lc-logo {
        display: flex;
        align-items: center;
        gap: 0.625rem;
      }
      .lc-icon {
        width: 34px; height: 34px;
        background: var(--primary);
        border-radius: var(--radius-sm);
        display: flex; align-items: center; justify-content: center;
        flex-shrink: 0;
      }
      .lc-icon svg { width: 17px; height: 17px; fill: var(--primary-fg); }
      .lc-name {
        font-size: 0.9375rem;
        font-weight: 600;
        color: var(--fg);
        letter-spacing: -0.01em;
      }

      /* divider */
      .lc-sep {
        width: 100%;
        height: 1px;
        background: var(--border);
        margin: 0.25rem 0;
      }

      /* skeleton rows – simulate sidebar + content */
      .lc-skeleton {
        width: 100%;
        display: flex;
        gap: 0.875rem;
        align-items: flex-start;
      }
      .lc-skel-sidebar {
        width: 64px;
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
        flex-shrink: 0;
      }
      .lc-skel-content {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
      }
      .skel {
        background: var(--muted);
        border-radius: 4px;
        animation: pulse 1.6s ease-in-out infinite;
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50%       { opacity: 0.45; }
      }

      /* footer row */
      .lc-status {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        margin-top: 0.25rem;
      }
      .lc-spinner {
        width: 14px; height: 14px;
        border: 2px solid var(--border);
        border-top-color: var(--primary);
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        flex-shrink: 0;
      }
      .lc-status-text {
        font-size: 0.75rem;
        color: var(--fg-muted);
      }
    </style>
  </head>

  <body>
    <!-- ── Loading screen ── -->
    <div id="admin-loading">
      <div class="lc">

        <div class="lc-logo">
          <div class="lc-icon">
            <!-- pen-line icon -->
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path d="M12 20h9M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"
                    fill="none" stroke="white" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <span class="lc-name">LUNE Admin</span>
        </div>

        <div class="lc-sep"></div>

        <!-- dashboard skeleton preview -->
        <div class="lc-skeleton">
          <div class="lc-skel-sidebar">
            <div class="skel" style="height:8px;width:48px;"></div>
            <div class="skel" style="height:6px;width:40px;animation-delay:.1s"></div>
            <div class="skel" style="height:6px;width:44px;animation-delay:.2s"></div>
            <div class="skel" style="height:6px;width:36px;animation-delay:.15s"></div>
            <div class="skel" style="height:6px;width:42px;animation-delay:.25s"></div>
          </div>
          <div class="lc-skel-content">
            <div class="skel" style="height:8px;width:80%;"></div>
            <div style="display:flex;gap:.5rem;margin-top:.25rem;">
              <div class="skel" style="height:48px;flex:1;border-radius:6px;animation-delay:.1s"></div>
              <div class="skel" style="height:48px;flex:1;border-radius:6px;animation-delay:.2s"></div>
            </div>
            <div class="skel" style="height:6px;width:90%;animation-delay:.05s"></div>
            <div class="skel" style="height:6px;width:70%;animation-delay:.1s"></div>
            <div class="skel" style="height:6px;width:85%;animation-delay:.15s"></div>
          </div>
        </div>

        <div class="lc-status">
          <div class="lc-spinner"></div>
          <span class="lc-status-text">正在加载内容管理器…</span>
        </div>
      </div>
    </div>

    <!-- ── Decap CMS ── -->
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>

    <script>
    (function () {
      'use strict';

      /* ─────────────────────────────────────────
         1. Preview pane – KaTeX CSS
         ───────────────────────────────────────── */
      try {
        CMS.registerPreviewStyle(
          'https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css'
        );
      } catch (_) {}

      /* ─────────────────────────────────────────
         2. Preview pane – blog-style typography
         ───────────────────────────────────────── */
      try {
        CMS.registerPreviewStyle([
          'body{',
          '  font-family:system-ui,-apple-system,"Segoe UI","Helvetica Neue",Arial,sans-serif;',
          '  max-width:720px;margin:0 auto;padding:2rem;',
          '  color:#09090b;background:#fff;line-height:1.75;font-size:15px;',
          '}',
          '*{box-sizing:border-box;}',
          'h1,h2,h3,h4,h5,h6{font-weight:600;letter-spacing:-.02em;line-height:1.3;color:#09090b;}',
          'h2{font-size:1.5rem;border-bottom:1px solid #e4e4e7;',
          '   padding-bottom:.5rem;margin-top:2.5rem;margin-bottom:1rem;}',
          'h3{font-size:1.25rem;margin-top:2rem;}',
          'p{margin-bottom:1.25rem;color:#3f3f46;}',
          'pre{font-family:"JetBrains Mono","Fira Code","Cascadia Code",monospace;',
          '    background:#f4f4f5;border:1px solid #e4e4e7;border-radius:6px;',
          '    padding:1rem 1.25rem;overflow-x:auto;font-size:.875rem;line-height:1.6;}',
          'code{font-family:"JetBrains Mono","Fira Code",monospace;',
          '     background:#f4f4f5;border:1px solid #e4e4e7;border-radius:3px;',
          '     padding:.15em .4em;font-size:.875em;}',
          'pre code{background:none;border:none;padding:0;}',
          'blockquote{border-left:3px solid #e4e4e7;margin-left:0;',
          '           padding-left:1.25rem;color:#71717a;font-style:normal;}',
          'img{max-width:100%;border:1px solid #e4e4e7;border-radius:6px;',
          '    display:block;margin:1.5rem auto;}',
          'a{color:#09090b;text-decoration:underline;text-underline-offset:3px;}',
          'a:hover{color:#71717a;}',
          'hr{border:none;border-top:1px solid #e4e4e7;margin:2rem 0;}',
          'table{border-collapse:collapse;width:100%;font-size:.875rem;}',
          'th,td{border:1px solid #e4e4e7;padding:.5rem .75rem;text-align:left;}',
          'th{background:#f4f4f5;font-weight:500;color:#3f3f46;}',
          '.katex-display{overflow-x:auto;overflow-y:hidden;padding:.5rem 0;}',
        ].join('\n'), { raw: true });
      } catch (_) {}

      /* ─────────────────────────────────────────
         3. Admin shell – shadcn/ui-inspired CSS
            Injected AFTER CMS so it wins the cascade
         ───────────────────────────────────────── */
      var SHELL_CSS = '\
/* ── Font ── */\n\
#nc-root,#nc-root *{\
  font-family:system-ui,-apple-system,"Segoe UI","Helvetica Neue",Arial,sans-serif!important;\
}\n\
\n\
/* ── Header: white bar with bottom border ── */\n\
#nc-root header{\
  background:#ffffff!important;\
  border-bottom:1px solid #e4e4e7!important;\
  box-shadow:none!important;\
  height:3.5rem!important;\
  min-height:3.5rem!important;\
}\n\
#nc-root header *{\
  color:#09090b!important;\
  fill:#09090b!important;\
  stroke:#09090b!important;\
}\n\
#nc-root header button,#nc-root header a{\
  text-transform:none!important;\
  letter-spacing:0!important;\
  font-weight:500!important;\
  font-size:.875rem!important;\
  border-radius:6px!important;\
  border:none!important;\
}\n\
#nc-root header button:hover,#nc-root header a:hover{\
  background:#f4f4f5!important;\
  opacity:1!important;\
}\n\
\n\
/* ── Sidebar ── */\n\
#nc-root aside,\n\
#nc-root [class*="Sidebar"],\n\
#nc-root [role="navigation"]{\
  background:#fafafa!important;\
  border-right:1px solid #e4e4e7!important;\
}\n\
#nc-root aside a,#nc-root [role="navigation"] a,\n\
#nc-root aside button,#nc-root [role="navigation"] button{\
  color:#52525b!important;\
  font-size:.8125rem!important;\
  font-weight:500!important;\
  letter-spacing:0!important;\
  text-transform:none!important;\
  border-radius:6px!important;\
}\n\
#nc-root aside a:hover,#nc-root [role="navigation"] a:hover{\
  background:#f4f4f5!important;\
  color:#09090b!important;\
}\n\
#nc-root aside [class*="active"],#nc-root [role="navigation"] [class*="active"],\n\
#nc-root aside [aria-current],#nc-root [role="navigation"] [aria-current]{\
  background:#f4f4f5!important;\
  color:#09090b!important;\
  font-weight:600!important;\
}\n\
\n\
/* ── Labels ── */\n\
#nc-root label{\
  color:#3f3f46!important;\
  font-size:.8125rem!important;\
  font-weight:500!important;\
  letter-spacing:0!important;\
  text-transform:none!important;\
}\n\
\n\
/* ── Inputs ── */\n\
#nc-root input,#nc-root textarea,#nc-root select{\
  border:1px solid #e4e4e7!important;\
  border-radius:6px!important;\
  background:#ffffff!important;\
  color:#09090b!important;\
  font-size:.875rem!important;\
  outline:none!important;\
  transition:border-color .15s,box-shadow .15s!important;\
}\n\
#nc-root input:focus,#nc-root textarea:focus,#nc-root select:focus{\
  border-color:#a1a1aa!important;\
  box-shadow:0 0 0 3px rgba(24,24,27,.08)!important;\
}\n\
#nc-root input::placeholder,#nc-root textarea::placeholder{\
  color:#a1a1aa!important;\
}\n\
\n\
/* ── Buttons ── */\n\
#nc-root button{\
  border-radius:6px!important;\
  font-size:.8125rem!important;\
  font-weight:500!important;\
  letter-spacing:0!important;\
  text-transform:none!important;\
  transition:background .15s,border-color .15s,box-shadow .15s!important;\
}\n\
#nc-root button[class*="primary"],\n\
#nc-root [class*="SaveButton"],\n\
#nc-root [class*="PublishButton"]{\
  background:#18181b!important;\
  color:#fafafa!important;\
  border:1px solid #18181b!important;\
  box-shadow:0 1px 2px rgba(0,0,0,.06)!important;\
}\n\
#nc-root button[class*="primary"]:hover,\n\
#nc-root [class*="SaveButton"]:hover,\n\
#nc-root [class*="PublishButton"]:hover{\
  background:#27272a!important;\
}\n\
#nc-root button:not([class*="primary"]):not([class*="Save"]):not([class*="Publish"]){\
  border:1px solid #e4e4e7!important;\
  background:#ffffff!important;\
  color:#09090b!important;\
}\n\
#nc-root button:not([class*="primary"]):not([class*="Save"]):not([class*="Publish"]):hover{\
  background:#f4f4f5!important;\
  border-color:#d4d4d8!important;\
}\n\
\n\
/* ── Entry cards ── */\n\
#nc-root [class*="EntryCard"],\n\
#nc-root [class*="card"],\n\
#nc-root [class*="Card"],\n\
#nc-root [class*="ListItem"]{\
  border:1px solid #e4e4e7!important;\
  border-radius:8px!important;\
  box-shadow:0 1px 2px rgba(0,0,0,.04)!important;\
  background:#ffffff!important;\
  transition:box-shadow .15s,transform .15s!important;\
}\n\
#nc-root [class*="EntryCard"]:hover,\n\
#nc-root [class*="card"]:hover{\
  box-shadow:0 4px 16px rgba(0,0,0,.08)!important;\
  transform:translateY(-1px)!important;\
}\n\
\n\
/* ── Markdown editor toolbar ── */\n\
#nc-root [class*="Toolbar"],\n\
#nc-root [class*="toolbar"]{\
  background:#fafafa!important;\
  border-bottom:1px solid #e4e4e7!important;\
}\n\
#nc-root [class*="Toolbar"] button,\n\
#nc-root [class*="toolbar"] button{\
  border:none!important;\
  border-radius:4px!important;\
}\n\
\n\
/* ── Scrollbars ── */\n\
#nc-root ::-webkit-scrollbar{width:5px;height:5px;}\n\
#nc-root ::-webkit-scrollbar-track{background:transparent;}\n\
#nc-root ::-webkit-scrollbar-thumb{background:#d4d4d8;border-radius:999px;}\n\
#nc-root ::-webkit-scrollbar-thumb:hover{background:#a1a1aa;}\n\
';

      function injectShellStyles() {
        if (document.getElementById('lune-shell')) return;
        var s = document.createElement('style');
        s.id = 'lune-shell';
        s.textContent = SHELL_CSS;
        document.head.appendChild(s);
      }

      /* ─────────────────────────────────────────
         4. KaTeX → preview iframe
         ───────────────────────────────────────── */
      var injected = new WeakSet();

      function setupMath(iframe) {
        var win = iframe.contentWindow;
        var doc = iframe.contentDocument;
        if (!win || !win.renderMathInElement) return;
        var OPTS = {
          delimiters: [
            { left: '$$',  right: '$$',  display: true  },
            { left: '$',   right: '$',   display: false },
            { left: '\\(', right: '\\)', display: false },
            { left: '\\[', right: '\\]', display: true  }
          ],
          throwOnError: false
        };
        function render() {
          try { win.renderMathInElement(doc.body, OPTS); } catch (_) {}
        }
        render();
        var t;
        new win.MutationObserver(function () {
          clearTimeout(t);
          t = setTimeout(render, 350);
        }).observe(doc.body, { childList: true, subtree: true, characterData: true });
      }

      function injectKatex(iframe) {
        if (injected.has(iframe)) return;
        var doc = iframe.contentDocument;
        if (!doc || !doc.head) return;
        try {
          injected.add(iframe);
          if (!doc.querySelector('#k-css')) {
            var lnk = doc.createElement('link');
            lnk.id = 'k-css'; lnk.rel = 'stylesheet';
            lnk.href = 'https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css';
            doc.head.appendChild(lnk);
          }
          if (!doc.querySelector('#k-core')) {
            var core = doc.createElement('script');
            core.id = 'k-core';
            core.src = 'https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js';
            core.onload = function () {
              if (doc.querySelector('#k-ar')) { setupMath(iframe); return; }
              var ar = doc.createElement('script');
              ar.id = 'k-ar';
              ar.src = 'https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js';
              ar.onload = function () { setupMath(iframe); };
              doc.head.appendChild(ar);
            };
            doc.head.appendChild(core);
          }
        } catch (_) {}
      }

      function tryInject(iframe) {
        if (!iframe || injected.has(iframe)) return;
        var doc = iframe.contentDocument;
        if (doc && doc.readyState !== 'loading' && doc.head) {
          injectKatex(iframe);
        } else {
          iframe.addEventListener('load', function () { injectKatex(iframe); }, { once: true });
        }
      }

      function watchIframes() {
        document.querySelectorAll('#nc-root iframe').forEach(tryInject);
        new MutationObserver(function (muts) {
          muts.forEach(function (m) {
            m.addedNodes.forEach(function (n) {
              if (n.nodeName === 'IFRAME') tryInject(n);
              if (n.querySelectorAll) n.querySelectorAll('iframe').forEach(tryInject);
            });
          });
        }).observe(document.body, { childList: true, subtree: true });
      }

      /* ─────────────────────────────────────────
         5. Boot sequence
         ───────────────────────────────────────── */
      var loading = document.getElementById('admin-loading');

      function boot() {
        injectShellStyles();
        watchIframes();
        loading.style.opacity = '0';
        setTimeout(function () { if (loading.parentNode) loading.remove(); }, 280);
      }

      var timer = setInterval(function () {
        var root = document.getElementById('nc-root');
        if (root && root.querySelector('header')) {
          clearInterval(timer);
          setTimeout(boot, 250);   /* wait for styled-components to finish injecting */
        }
      }, 150);

      setTimeout(function () { clearInterval(timer); boot(); }, 9000);

    })();
    </script>
  </body>
</html>
