<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>June's Site</title>
    <script>
      // Single Page Apps for GitHub Pages
      // Redirects all paths to index.html with the path stored in a query param
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        '/?p=' + encodeURIComponent(l.pathname + l.search) +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
