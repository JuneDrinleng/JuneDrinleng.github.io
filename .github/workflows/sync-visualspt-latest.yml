name: Sync visualSPT latest.yml

on:
  workflow_dispatch:
  schedule:
    - cron: "15 * * * *"

permissions:
  contents: write

jobs:
  sync-latest-yml:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download latest.yml from visualSPT release
        shell: bash
        run: |
          set -euo pipefail

          API_URL="https://api.github.com/repos/JuneDrinleng/visualSPT/releases/latest"
          RELEASE_JSON="$(curl -fsSL "$API_URL")"

          ASSET_API_URL="$(echo "$RELEASE_JSON" | jq -r '.assets[] | select(.name=="latest.yml") | .url' || true)"
          if [[ -z "${ASSET_API_URL}" || "${ASSET_API_URL}" == "null" ]]; then
            echo "No latest.yml asset found in latest release."
            exit 1
          fi

          mkdir -p public
          curl -fsSL \
            -H "Accept: application/octet-stream" \
            "$ASSET_API_URL" \
            -o public/visualspt-latest.yml

          echo "Synced public/visualspt-latest.yml:"
          cat public/visualspt-latest.yml

      - name: Commit if changed
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- public/visualspt-latest.yml; then
            echo "No changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/visualspt-latest.yml
          git commit -m "chore: sync visualspt-latest.yml"
          git push
