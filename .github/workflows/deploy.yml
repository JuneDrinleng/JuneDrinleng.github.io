name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "15 * * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync latest.yml from visualSPT release
        shell: bash
        run: |
          set -euo pipefail

          API_URL="https://api.github.com/repos/JuneDrinleng/visualSPT/releases/latest"
          RELEASE_JSON="$(curl -fsSL "$API_URL")"

          ASSET_API_URL="$(echo "$RELEASE_JSON" | jq -r '.assets[] | select(.name=="latest.yml") | .url' || true)"
          if [[ -z "${ASSET_API_URL}" || "${ASSET_API_URL}" == "null" ]]; then
            echo "No latest.yml asset found in latest release."
            exit 1
          fi

          mkdir -p public
          curl -fsSL \
            -H "Accept: application/octet-stream" \
            "$ASSET_API_URL" \
            -o public/visualspt-latest.yml

          echo "Synced public/visualspt-latest.yml:"
          cat public/visualspt-latest.yml

      - name: Commit synced visualspt-latest.yml (if changed)
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- public/visualspt-latest.yml; then
            echo "No sync changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/visualspt-latest.yml
          git commit -m "chore: sync visualspt-latest.yml [skip ci]"
          git push

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm build

      - name: Generate sitemap
        run: node scripts/generate-sitemap.mjs

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
